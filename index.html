<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap Dungeon</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background:#0a0a0f; color:#ddd;
  font-family:monospace; height:100%;
  overflow:hidden; touch-action:none;
}

/* ── Top HUD ── */
#ui {
  position:fixed; top:0; left:0; right:0;
  display:flex; align-items:center;
  padding:6px 10px; gap:8px;
  background:rgba(0,0,0,0.78);
  font-size:12px; z-index:10;
}
#bars { display:flex; flex-direction:column; gap:3px; }
.bar-row { display:flex; align-items:center; gap:4px; }
.bar-label { color:#888; width:18px; text-align:right; font-size:11px; }
.bar-wrap { width:80px; height:8px; background:#222; border-radius:4px; overflow:hidden; }
#hp-bar  { height:100%; background:#27ae60; transition:width .15s; }
#mp-bar  { height:100%; background:#2980b9; transition:width .15s; }
#stats { display:flex; flex-direction:column; gap:2px; color:#aaa; font-size:11px; line-height:1.4; }
#stats b { color:#fff; }
#gems-btn {
  margin-left:auto; display:flex; align-items:center; gap:4px;
  background:rgba(20,200,160,0.15); border:1.5px solid rgba(20,200,160,0.4);
  border-radius:8px; padding:6px 10px;
  cursor:pointer; touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  font-size:13px; color:#20e8b0;
  pointer-events:all;
}
#gems-btn:active { background:rgba(20,200,160,0.35); }

/* ── Potion buttons (bottom-left) ── */
#potions {
  position:fixed; bottom:16px; left:16px;
  display:none; gap:8px;
  z-index:15;
}
.pot-btn {
  display:flex; flex-direction:column; align-items:center;
  background:rgba(0,0,0,0.65); border-radius:10px;
  border:1.5px solid rgba(255,255,255,0.25);
  padding:8px 10px; font-size:11px;
  cursor:pointer; touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  color:#ddd; font-family:monospace;
  min-width:52px;
}
.pot-btn:active { background:rgba(255,255,255,0.2); }
.pot-btn span { font-size:20px; line-height:1.1; }
#stairs-btn {
  position:fixed; bottom:16px; left:16px;
  display:none;
  background:#27ae60; color:#fff;
  border:2px solid #2ecc71; border-radius:10px;
  padding:13px 16px; font-size:0.9rem;
  font-family:monospace; cursor:pointer;
  z-index:16; touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
#stairs-btn:active { background:#219a52; }

/* ── D-pad ── */
#dpad {
  position:fixed; bottom:16px; right:16px;
  z-index:15; pointer-events:none;
}
.dpad-grid {
  display:grid;
  grid-template-columns:repeat(3, 58px);
  grid-template-rows:repeat(3, 58px);
  gap:4px; pointer-events:none;
}
.dpad-btn {
  pointer-events:all;
  background:rgba(180,210,255,0.12);
  border:1.5px solid rgba(180,210,255,0.25);
  border-radius:12px; color:rgba(255,255,255,0.8);
  font-size:22px; display:flex;
  align-items:center; justify-content:center;
  cursor:pointer; touch-action:manipulation;
  user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.dpad-btn:active, .dpad-btn.active {
  background:rgba(180,210,255,0.35);
  border-color:rgba(180,210,255,0.65);
  color:#fff;
}
.dpad-corner { visibility:hidden; pointer-events:none; }
#dpad-c {
  font-size:18px;
  color:rgba(180,120,255,0.85);
  border-color:rgba(180,120,255,0.4);
  background:rgba(80,20,140,0.25);
}
#dpad-c.no-mana {
  color:rgba(255,255,255,0.25);
  border-color:rgba(255,255,255,0.12);
  background:rgba(0,0,0,0.1);
}

/* ── Toast message ── */
#msg {
  position:fixed; top:48px; left:0; right:0;
  text-align:center; font-size:13px; color:#f39c12;
  pointer-events:none; z-index:10;
  transition:opacity .5s;
  text-shadow:0 1px 4px #000;
}

/* ── Overlays ── */
.overlay-base {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.88);
  display:flex; flex-direction:column;
  align-items:center; z-index:20;
}
#start-overlay {
  justify-content:center; gap:16px;
}
#start-overlay h1 { font-size:2.2rem; color:#e74c3c; letter-spacing:3px; }
#start-overlay p { color:#aaa; font-size:.9rem; text-align:center; max-width:300px; line-height:1.7; }
.big-btn {
  padding:14px 36px;
  background:#2c3e50; border:2px solid #3498db;
  color:#fff; font-size:1rem; font-family:monospace;
  border-radius:8px; cursor:pointer;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent;
}
.big-btn:active { background:#3498db; }

/* ── Skill Shop ── */
#skill-shop {
  justify-content:flex-start;
  overflow-y:auto; padding:0;
  display:none;
}
#skill-shop-inner {
  width:100%; max-width:420px;
  display:flex; flex-direction:column;
  min-height:100%;
}
#skill-shop-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 16px 10px;
  border-bottom:1px solid #333;
  position:sticky; top:0; background:rgba(0,0,0,0.95); z-index:1;
}
#skill-shop-header h2 { color:#20e8b0; letter-spacing:2px; font-size:1.2rem; }
#shop-gems-count { color:#20e8b0; font-size:1.1rem; }
#skill-list { padding:10px 12px; flex:1; }
.skill-item {
  display:flex; align-items:center; gap:12px;
  padding:12px; margin-bottom:8px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;
}
.skill-item.maxed { opacity:.5; }
.skill-icon { font-size:26px; width:34px; text-align:center; flex-shrink:0; }
.skill-info { flex:1; }
.skill-name { color:#fff; font-size:.95rem; }
.skill-lv { color:#888; font-size:.8rem; }
.skill-desc { color:#aaa; font-size:.8rem; margin-top:3px; line-height:1.4; }
.skill-buy {
  flex-shrink:0; min-width:60px;
  padding:8px 0;
  background:#2c3e50; border:1.5px solid #3498db;
  color:#fff; font-family:monospace; font-size:.85rem;
  border-radius:8px; cursor:pointer;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  text-align:center;
}
.skill-buy:disabled { background:#111; border-color:#333; color:#555; cursor:default; }
.skill-buy:not(:disabled):active { background:#3498db; }
#shop-close-btn {
  width:100%; padding:16px;
  background:#1a1a2e; border:none; border-top:1px solid #333;
  color:#888; font-family:monospace; font-size:1rem;
  cursor:pointer; touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  position:sticky; bottom:0;
}
#shop-close-btn:active { background:#2c2c50; color:#fff; }

canvas { display:block; }
</style>
</head>
<body>

<!-- HUD -->
<div id="ui">
  <div id="bars">
    <div class="bar-row">
      <span class="bar-label">HP</span>
      <div class="bar-wrap"><div id="hp-bar" style="width:100%"></div></div>
    </div>
    <div class="bar-row">
      <span class="bar-label">MP</span>
      <div class="bar-wrap"><div id="mp-bar" style="width:100%"></div></div>
    </div>
  </div>
  <div id="stats">
    <div><span style="color:#888">Fl </span><b id="floor-num">1</b>  <span style="color:#888">Lv </span><b id="level-num">1</b></div>
    <div><span style="color:#888">ATK </span><b id="atk-num">3</b>  <b id="diff-label" style="font-size:10px"></b></div>
  </div>
  <div id="gems-btn" id="gems-btn">
    <span>💎</span><b id="gems-num">0</b>
    <span style="font-size:10px;color:#14c09a;margin-left:2px">SKILLS</span>
  </div>
</div>

<canvas id="c"></canvas>
<div id="msg"></div>

<!-- Potion buttons -->
<div id="potions" style="display:flex">
  <button class="pot-btn" id="pot-red">
    <span>🔴</span><span id="pot-red-count">×0</span>
  </button>
  <button class="pot-btn" id="pot-blue">
    <span>🔵</span><span id="pot-blue-count">×0</span>
  </button>
</div>

<button id="stairs-btn">⬇ Descend</button>

<!-- D-pad -->
<div id="dpad">
  <div class="dpad-grid">
    <div class="dpad-corner"></div>
    <button class="dpad-btn" id="dpad-n">▲</button>
    <div class="dpad-corner"></div>
    <button class="dpad-btn" id="dpad-w">◀</button>
    <button class="dpad-btn" id="dpad-c">✦</button>
    <button class="dpad-btn" id="dpad-e">▶</button>
    <div class="dpad-corner"></div>
    <button class="dpad-btn" id="dpad-s">▼</button>
    <div class="dpad-corner"></div>
  </div>
</div>

<!-- Start / death overlay (content built by JS) -->
<div id="start-overlay" class="overlay-base"></div>

<!-- Skill shop overlay -->
<div id="skill-shop" class="overlay-base">
  <div id="skill-shop-inner">
    <div id="skill-shop-header">
      <h2>SKILL SHOP</h2>
      <span id="shop-gems-count">💎 0</span>
    </div>
    <div id="skill-list"></div>
    <button id="shop-close-btn">✕ Close</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const TILE = 40;
const MAP_W = 40, MAP_H = 40;
const ROOM_MIN = 4, ROOM_MAX = 10, ROOM_TRIES = 30;
const T = { WALL: 0, FLOOR: 1, STAIRS: 2 };
const MAGIC_COST = 5;
const BASE_VISION = 7;
const BASE_DETECT = 8;

// ── Difficulty presets ────────────────────────────────────────
const DIFFICULTIES = {
  easy: {
    key:'easy', label:'Easy', color:'#27ae60',
    desc:'More HP, weaker enemies, plentiful gems & potions.',
    baseVision:9, baseDetect:5,
    playerHp:30, playerMp:20, playerAtk:4,
    enemyHpMult:0.6, enemyAtkMult:0.55,
    enemyCount: fl => Math.min(1 + fl,       10),
    gemCount:   fl => 4 + fl * 2,
    potionBonus:0.22,   // added to enemy dropRate
    xpMult:1.0,
  },
  balanced: {
    key:'balanced', label:'Balanced', color:'#3498db',
    desc:'Fair challenge. Intended experience.',
    baseVision:7, baseDetect:8,
    playerHp:20, playerMp:15, playerAtk:3,
    enemyHpMult:1.0, enemyAtkMult:1.0,
    enemyCount: fl => Math.min(2 + fl * 2,   14),
    gemCount:   fl => 3 + fl,
    potionBonus:0,
    xpMult:1.0,
  },
  unlikely: {
    key:'unlikely', label:'Unlikely', color:'#e74c3c',
    desc:'Brutal. Scarce resources, relentless enemies.',
    baseVision:6, baseDetect:11,
    playerHp:12, playerMp:10, playerAtk:2,
    enemyHpMult:1.7, enemyAtkMult:1.6,
    enemyCount: fl => Math.min(4 + fl * 3,   22),
    gemCount:   fl => Math.max(1, 1 + Math.floor(fl * 0.6)),
    potionBonus:-0.12,
    xpMult:1.6,
  },
};

// ═══════════════════════════════════════════════════════════════
// SKILL DEFINITIONS
// ═══════════════════════════════════════════════════════════════
const SKILL_DEFS = [
  {
    id: 'ironSkin',
    name: 'Iron Skin',
    icon: '🛡️',
    maxLevel: 3, cost: 2,
    effectLine: lv => `−${lv * 20}% incoming damage`,
    nextLine:   lv => `next: −${(lv + 1) * 20}% damage`,
  },
  {
    id: 'shadowWalk',
    name: 'Shadow Walk',
    icon: '🌑',
    maxLevel: 2, cost: 3,
    effectLine: lv => `enemies detect you at ${(state.diff?.baseDetect??BASE_DETECT) - lv*2} tiles`,
    nextLine:   lv => `next: detect at ${(state.diff?.baseDetect??BASE_DETECT) - (lv+1)*2} tiles`,
  },
  {
    id: 'eagleEye',
    name: 'Eagle Eye',
    icon: '👁️',
    maxLevel: 3, cost: 2,
    effectLine: lv => `sight radius ${(state.diff?.baseVision??BASE_VISION) + lv*2}`,
    nextLine:   lv => `next: sight ${(state.diff?.baseVision??BASE_VISION) + (lv+1)*2}`,
  },
  {
    id: 'arcaneBlast',
    name: 'Arcane Blast',
    icon: '✨',
    maxLevel: 2, cost: 3,
    effectLine: lv => ['3×3 AoE (base)', '5×5 AoE', '7×7 AoE'][lv],
    nextLine:   lv => ['next: 5×5 AoE', 'next: 7×7 AoE'][lv],
  },
  {
    id: 'manaWell',
    name: 'Mana Well',
    icon: '💧',
    maxLevel: 2, cost: 2,
    effectLine: lv => `max MP ${15 + lv * 10}`,
    nextLine:   lv => `next: max MP ${15 + (lv + 1) * 10}`,
  },
];

// ═══════════════════════════════════════════════════════════════
// SKILL HELPERS  (read from state.skills)
// ═══════════════════════════════════════════════════════════════
function visionRadius() { return (state.diff?.baseVision ?? BASE_VISION) + state.skills.eagleEye * 2; }
function detectRange()  { return (state.diff?.baseDetect ?? BASE_DETECT) - state.skills.shadowWalk * 2; }
function mitigation()   { return state.skills.ironSkin * 0.2; }
function maxMp()        { return (state.diff?.playerMp ?? 15) + state.skills.manaWell * 10; }
function aoERange()     { return 1 + state.skills.arcaneBlast; }
function xpThreshold(level) { return level * 10 * (state.diff?.xpMult ?? 1); }

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let state = {};
let zoom = 1.0;
const ZOOM_MIN = 0.22, ZOOM_MAX = 2.4;
let flashTiles = [];
let flashTimer = null;

// ═══════════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', () => { resizeCanvas(); render(); });
resizeCanvas();

// ═══════════════════════════════════════════════════════════════
// SPRITES
// ═══════════════════════════════════════════════════════════════
const sprites = {};

function makeSprite(fn) {
  const oc = new OffscreenCanvas(TILE, TILE);
  fn(oc.getContext('2d'));
  return oc;
}

function hexPath(c, cx, cy, r) {
  c.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i * 60 - 30) * Math.PI / 180;
    i === 0 ? c.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a))
            : c.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  c.closePath();
}

function buildSprites() {
  // ── floor tiles ──────────────────────────────────────────────
  function drawFloorBase(c, lit) {
    c.fillStyle = lit ? '#1c2e54' : '#111a2e';
    c.fillRect(0, 0, TILE, TILE);
    c.strokeStyle = lit ? '#243565' : '#16203a'; c.lineWidth = 1;
    c.beginPath(); c.moveTo(0, TILE/2); c.lineTo(TILE, TILE/2); c.stroke();
    c.beginPath(); c.moveTo(TILE/2, 0); c.lineTo(TILE/2, TILE); c.stroke();
    c.fillStyle = lit ? '#1a274a' : '#0e1628';
    [[0,0],[TILE-4,0],[0,TILE-4],[TILE-4,TILE-4]].forEach(([x,y]) => c.fillRect(x,y,4,4));
  }
  sprites.floor = makeSprite(c => {
    drawFloorBase(c, false);
    c.strokeStyle = '#0d1424'; c.lineWidth = 1;
    c.beginPath(); c.moveTo(8,6); c.lineTo(14,12); c.stroke();
    c.beginPath(); c.moveTo(28,24); c.lineTo(32,30); c.stroke();
  });
  sprites.floorLit = makeSprite(c => {
    drawFloorBase(c, true);
    c.strokeStyle = '#162040'; c.lineWidth = 1;
    c.beginPath(); c.moveTo(8,6); c.lineTo(14,12); c.stroke();
    c.beginPath(); c.moveTo(28,24); c.lineTo(32,30); c.stroke();
  });

  // ── wall tiles ───────────────────────────────────────────────
  function drawWall(c, lit) {
    c.fillStyle = lit ? '#13132c' : '#0a0a18'; c.fillRect(0,0,TILE,TILE);
    c.fillStyle = lit ? '#1e1e40' : '#141430';
    c.fillRect(1,1,17,8); c.fillRect(21,1,18,8);
    c.fillRect(1,11,10,8); c.fillRect(13,11,14,8); c.fillRect(29,11,10,8);
    c.fillRect(1,21,17,8); c.fillRect(21,21,18,8);
    c.fillRect(1,31,10,8); c.fillRect(13,31,14,8); c.fillRect(29,31,10,8);
    if (lit) { c.fillStyle='#28285a'; c.fillRect(0,0,TILE,1); }
  }
  sprites.wall    = makeSprite(c => drawWall(c, false));
  sprites.wallLit = makeSprite(c => drawWall(c, true));

  // ── stairs ───────────────────────────────────────────────────
  sprites.stairs = makeSprite(c => {
    drawFloorBase(c, true);
    const sx = 9;
    c.fillStyle='#a07800'; c.fillRect(sx+5,11,22,5);
    c.fillStyle='#c89600'; c.fillRect(sx+2,17,26,5);
    c.fillStyle='#e0aa00'; c.fillRect(sx,23,30,5);
    c.fillStyle='#ffe040';
    c.beginPath(); c.moveTo(TILE/2,32); c.lineTo(TILE/2-6,24); c.lineTo(TILE/2+6,24); c.closePath(); c.fill();
  });

  // ── player ───────────────────────────────────────────────────
  sprites.player = makeSprite(c => {
    const cx=TILE/2, cy=TILE/2;
    c.fillStyle='rgba(52,152,219,0.22)'; c.beginPath(); c.arc(cx,cy,18,0,Math.PI*2); c.fill();
    c.fillStyle='#1a5a9a'; c.beginPath(); c.arc(cx,cy+3,13,0,Math.PI*2); c.fill();
    c.fillStyle='#2a7ac0'; c.beginPath(); c.ellipse(cx,cy+1,9,8,0,0,Math.PI*2); c.fill();
    c.fillStyle='#1a5090'; c.beginPath(); c.arc(cx,cy-3,10,Math.PI,0); c.closePath(); c.fill();
    c.fillStyle='#4090d0'; c.fillRect(cx-11,cy-4,22,3);
    c.fillStyle='#040a1a'; c.beginPath(); c.ellipse(cx,cy+1,6,4,0,0,Math.PI*2); c.fill();
    c.fillStyle='#60e0ff';
    c.beginPath(); c.arc(cx-2.5,cy+1,1.8,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(cx+2.5,cy+1,1.8,0,Math.PI*2); c.fill();
    c.fillStyle='#2060a8';
    c.beginPath(); c.ellipse(cx-12,cy+4,5,4,0.4,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(cx+12,cy+4,5,4,-0.4,0,Math.PI*2); c.fill();
  });

  // ── skill gem ────────────────────────────────────────────────
  sprites.gem = makeSprite(c => {
    const cx=TILE/2, cy=TILE/2-1;
    c.fillStyle='rgba(0,0,0,0.4)';
    c.beginPath(); c.ellipse(cx+1,cy+14,9,3,0,0,Math.PI*2); c.fill();
    c.fillStyle='#087858'; hexPath(c,cx,cy,14); c.fill();
    c.fillStyle='#14c09a'; hexPath(c,cx,cy,12); c.fill();
    c.fillStyle='#30e8c0'; hexPath(c,cx,cy,9); c.fill();
    // Top facet highlight
    c.fillStyle='#60ffd8';
    c.beginPath(); c.moveTo(cx,cy-9); c.lineTo(cx-5,cy-3); c.lineTo(cx+5,cy-3); c.closePath(); c.fill();
    // Shine
    c.fillStyle='rgba(255,255,255,0.55)';
    c.beginPath(); c.ellipse(cx-2,cy-5,3.5,2,-.6,0,Math.PI*2); c.fill();
    // Inner dark center
    c.fillStyle='rgba(0,80,60,0.4)';
    c.beginPath(); c.ellipse(cx,cy+2,4,5,0,0,Math.PI*2); c.fill();
  });

  // ── potions ──────────────────────────────────────────────────
  function drawPotion(c, bodyCol, liquidCol) {
    const cx=TILE/2, cy=TILE/2+2;
    c.fillStyle='rgba(0,0,0,0.35)';
    c.beginPath(); c.ellipse(cx,cy+11,7,2.5,0,0,Math.PI*2); c.fill();
    // Body
    c.fillStyle=bodyCol;
    c.beginPath(); c.ellipse(cx,cy+2,8,10,0,0,Math.PI*2); c.fill();
    // Neck
    c.fillRect(cx-3,cy-9,6,6);
    // Cork
    c.fillStyle='#b8904a'; c.fillRect(cx-3,cy-14,6,6); c.fillRect(cx-2,cy-16,4,3);
    // Liquid glow
    c.fillStyle=liquidCol;
    c.beginPath(); c.ellipse(cx-2,cy,3,5,-.3,0,Math.PI*2); c.fill();
    // Bubble
    c.fillStyle='rgba(255,255,255,0.35)';
    c.beginPath(); c.arc(cx+2,cy-2,2,0,Math.PI*2); c.fill();
    // Glass highlight
    c.fillStyle='rgba(255,255,255,0.2)';
    c.beginPath(); c.ellipse(cx-4,cy-4,2,6,.3,0,Math.PI*2); c.fill();
  }
  sprites.redPotion  = makeSprite(c => drawPotion(c,'#8a1020','rgba(255,70,70,.65)'));

// ═══════════════════════════════════════════════════════════════
// MAP GENERATION
// ═══════════════════════════════════════════════════════════════
function makeMap() {
  const map = Array.from({length:MAP_H}, () => new Uint8Array(MAP_W));
  const rooms = [];
  function carveRoom(rx,ry,rw,rh) {
    for (let y=ry;y<ry+rh;y++) for (let x=rx;x<rx+rw;x++) map[y][x]=T.FLOOR;
  }
  function carveTunnel(x1,y1,x2,y2) {
    let cx=x1,cy=y1;
    if (Math.random()<.5) {
      while(cx!==x2){map[cy][cx]=T.FLOOR;cx+=cx<x2?1:-1;}
      while(cy!==y2){map[cy][cx]=T.FLOOR;cy+=cy<y2?1:-1;}
    } else {
      while(cy!==y2){map[cy][cx]=T.FLOOR;cy+=cy<y2?1:-1;}
      while(cx!==x2){map[cy][cx]=T.FLOOR;cx+=cx<x2?1:-1;}
    }
    map[y2][x2]=T.FLOOR;
  }
  for (let i=0;i<ROOM_TRIES;i++) {
    const w=ROOM_MIN+Math.floor(Math.random()*(ROOM_MAX-ROOM_MIN));
    const h=ROOM_MIN+Math.floor(Math.random()*(ROOM_MAX-ROOM_MIN));
    const x=1+Math.floor(Math.random()*(MAP_W-w-2));
    const y=1+Math.floor(Math.random()*(MAP_H-h-2));
    if (rooms.some(r=>x<r.x+r.w+1&&x+w+1>r.x&&y<r.y+r.h+1&&y+h+1>r.y)) continue;
    carveRoom(x,y,w,h);
    if (rooms.length>0) {
      const prev=rooms[rooms.length-1];
      carveTunnel(prev.cx,prev.cy,Math.floor(x+w/2),Math.floor(y+h/2));
    }
    rooms.push({x,y,w,h,cx:Math.floor(x+w/2),cy:Math.floor(y+h/2)});
  }
  const last=rooms[rooms.length-1];
  map[last.cy][last.cx]=T.STAIRS;
  return {map,rooms};
}

// ═══════════════════════════════════════════════════════════════
// FOG OF WAR
// ═══════════════════════════════════════════════════════════════
function makeFow() { return Array.from({length:MAP_H},()=>new Uint8Array(MAP_W)); }
function computeVision(fow,map,px,py,radius) {
  for (let y=0;y<MAP_H;y++) for (let x=0;x<MAP_W;x++) if(fow[y][x]===2) fow[y][x]=1;
  for (let angle=0;angle<360;angle+=2) {
    const rad=angle*Math.PI/180;
    let rx=px+.5,ry=py+.5;
    const dx=Math.cos(rad)*.5,dy=Math.sin(rad)*.5;
    for (let step=0;step<radius*2;step++) {
      const tx=Math.floor(rx),ty=Math.floor(ry);
      if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H) break;
      fow[ty][tx]=2;
      if(map[ty][tx]===T.WALL) break;
      rx+=dx;ry+=dy;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// ENEMY TYPES
// ═══════════════════════════════════════════════════════════════
const ENEMY_TYPES = [
  {name:'Rat',    spriteKey:'rat',    hp:3,  atk:1, xp:1,  dropRate:.25},
  {name:'Goblin', spriteKey:'goblin', hp:6,  atk:2, xp:3,  dropRate:.35},
  {name:'Orc',    spriteKey:'orc',    hp:12, atk:3, xp:6,  dropRate:.45},
  {name:'Troll',  spriteKey:'troll',  hp:20, atk:5, xp:12, dropRate:.60},
];

function spawnEnemies(rooms, floor) {
  const diff = state.diff;
  const enemies = [];
  const count = diff.enemyCount(floor);
  const pool = ENEMY_TYPES.slice(0, Math.min(1+Math.floor(floor/2), ENEMY_TYPES.length));
  for (let i=0;i<count;i++) {
    const room=rooms[1+Math.floor(Math.random()*(rooms.length-1))];
    const type=pool[Math.floor(Math.random()*pool.length)];
    const scaledHp  = Math.max(1, Math.round(type.hp  * diff.enemyHpMult));
    const scaledAtk = Math.max(1, Math.round(type.atk * diff.enemyAtkMult));
    enemies.push({...type,
      x:room.x+1+Math.floor(Math.random()*(room.w-2)),
      y:room.y+1+Math.floor(Math.random()*(room.h-2)),
      hp:scaledHp, maxHp:scaledHp, atk:scaledAtk,
    });
  }
  return enemies;
}

function spawnGems(rooms, floor) {
  const gems = [];
  const count = state.diff.gemCount(floor);
  for (let i=0;i<count;i++) {
    const room=rooms[Math.floor(Math.random()*rooms.length)];
    gems.push({
      x:room.x+1+Math.floor(Math.random()*(room.w-2)),
      y:room.y+1+Math.floor(Math.random()*(room.h-2)),
      val:1+Math.floor(Math.random()*(1+Math.floor(floor/2))),
    });
  }
  return gems;
}

function maybeDropPotion(enemy, x, y) {
  const rate = Math.min(0.9, Math.max(0, enemy.dropRate + state.diff.potionBonus));
  if (Math.random() > rate) return;
  const type = Math.random() < .6 ? 'red' : 'blue';
  state.potions.push({x, y, type});
}

// GAME INIT
// ═══════════════════════════════════════════════════════════════
function newGame(diffKey) {
  const diff = DIFFICULTIES[diffKey] ?? DIFFICULTIES.balanced;
  const {map,rooms} = makeMap();
  const start = rooms[0];
  zoom = 1.0;
  state = {
    map, rooms,
    fow: makeFow(),
    floor: 1,
    diff,
    player: {
      x:start.cx, y:start.cy,
      hp:diff.playerHp, maxHp:diff.playerHp,
      mp:diff.playerMp,
      atk:diff.playerAtk,
      gems:0,
      potions:{red:0, blue:0},
      xp:0, level:1,
    },
    skills: {ironSkin:0, shadowWalk:0, eagleEye:0, arcaneBlast:0, manaWell:0},
    enemies: spawnEnemies(rooms,1),
    gems: spawnGems(rooms,1),
    potions: [],
    alive: true,
  };
  computeVision(state.fow,state.map,state.player.x,state.player.y,visionRadius());
  updateUI();
  showMsg('');
  document.getElementById('stairs-btn').style.display='none';
  render();
}

function nextFloor() {
  state.floor++;
  const {map,rooms} = makeMap();
  const start = rooms[0];
  Object.assign(state, {
    map, rooms,
    fow: makeFow(),
    enemies: spawnEnemies(rooms, state.floor),
    gems: spawnGems(rooms, state.floor),
    potions: [],
  });
  state.player.x = start.cx;
  state.player.y = start.cy;
  state.player.hp = Math.min(state.player.maxHp, state.player.hp + 5);
  // Refill some mana on descent
  const curMax = maxMp();
  state.player.mp = Math.min(curMax, state.player.mp + 5);
  computeVision(state.fow,state.map,state.player.x,state.player.y,visionRadius());
  updateUI();
  document.getElementById('stairs-btn').style.display='none';
  showMsg(`Floor ${state.floor} — descending…`);
  render();
}

// UI
// ═══════════════════════════════════════════════════════════════
function updateUI() {
  const p = state.player;
  const curMax = maxMp();
  // Clamp mp to current max (in case manaWell was just bought)
  if (p.mp > curMax) p.mp = curMax;

  const hpPct = (p.hp/p.maxHp)*100;
  document.getElementById('hp-bar').style.width = hpPct+'%';
  document.getElementById('hp-bar').style.background =
    hpPct>50?'#27ae60':hpPct>25?'#e67e22':'#c0392b';

  const mpPct = (p.mp/curMax)*100;
  document.getElementById('mp-bar').style.width = mpPct+'%';

  document.getElementById('floor-num').textContent  = state.floor;
  document.getElementById('level-num').textContent  = p.level;
  document.getElementById('atk-num').textContent    = p.atk;
  const dn = document.getElementById('diff-label');
  if (dn) { dn.textContent = state.diff.label; dn.style.color = state.diff.color; }
  document.getElementById('gems-num').textContent   = p.gems;
  document.getElementById('pot-red-count').textContent  = '×'+p.potions.red;
  document.getElementById('pot-blue-count').textContent = '×'+p.potions.blue;

  // Dpad center mana indicator
  const magicOk = p.mp >= MAGIC_COST;
  const dc = document.getElementById('dpad-c');
  dc.classList.toggle('no-mana', !magicOk);
}

let msgTimer = null;
function showMsg(text) {
  const el = document.getElementById('msg');
  el.textContent = text; el.style.opacity = 1;
  clearTimeout(msgTimer);
  if (text) msgTimer = setTimeout(()=>{ el.style.opacity=0; }, 2500);
}

// ═══════════════════════════════════════════════════════════════
// MAGIC ATTACK
// ═══════════════════════════════════════════════════════════════
function magicAttack() {
  if (!state.alive) return;
  const p = state.player;
  if (p.mp < MAGIC_COST) { showMsg(`Need ${MAGIC_COST} MP for Arcane Blast!`); return; }

  p.mp -= MAGIC_COST;
  const range = aoERange();
  const tiles = [];
  for (let dy=-range;dy<=range;dy++) {
    for (let dx=-range;dx<=range;dx++) {
      const tx=p.x+dx, ty=p.y+dy;
      if (tx>=0&&ty>=0&&tx<MAP_W&&ty<MAP_H) tiles.push({x:tx,y:ty});
    }
  }

  const magicDmg = Math.max(2, p.atk);
  let hits = 0;
  for (let i=state.enemies.length-1;i>=0;i--) {
    const e=state.enemies[i];
    if (tiles.some(t=>t.x===e.x&&t.y===e.y)) {
      e.hp -= magicDmg;
      hits++;
      if (e.hp<=0) {
        p.xp += e.xp;
        maybeDropPotion(e, e.x, e.y);
        state.enemies.splice(i,1);
        checkLevelUp();
      }
    }
  }

  flashTiles = tiles;
  clearTimeout(flashTimer);
  flashTimer = setTimeout(()=>{ flashTiles=[]; render(); }, 280);

  showMsg(hits>0
    ? `Arcane Blast! ${hits} enem${hits>1?'ies':'y'} hit for ${magicDmg}`
    : `Arcane Blast! (no targets in ${range*2+1}×${range*2+1})`);

  enemyTurns();
  updateUI();
  computeVision(state.fow,state.map,p.x,p.y,visionRadius());
  render();
}

// ═══════════════════════════════════════════════════════════════
// MOVEMENT & COMBAT
// ═══════════════════════════════════════════════════════════════
function tryMove(dx, dy) {
  if (!state.alive||(dx===0&&dy===0)) return;
  const p = state.player;
  const nx=p.x+dx, ny=p.y+dy;
  if (nx<0||ny<0||nx>=MAP_W||ny>=MAP_H) return;
  if (state.map[ny][nx]===T.WALL) return;

  // Physical attack
  const ei = state.enemies.findIndex(e=>e.x===nx&&e.y===ny);
  if (ei!==-1) {
    const e = state.enemies[ei];
    e.hp -= p.atk;
    if (e.hp<=0) {
      p.xp += e.xp;
      maybeDropPotion(e, e.x, e.y);
      state.enemies.splice(ei,1);
      showMsg(`${e.name} slain! +${e.xp} XP`);
      checkLevelUp();
    } else {
      showMsg(`Hit ${e.name} for ${p.atk}. (${e.hp}/${e.maxHp})`);
    }
    enemyTurns();
    updateUI();
    computeVision(state.fow,state.map,p.x,p.y,visionRadius());
    render();
    return;
  }

  p.x=nx; p.y=ny;

  // Pick up gem
  const gi = state.gems.findIndex(g=>g.x===nx&&g.y===ny);
  if (gi!==-1) {
    p.gems += state.gems[gi].val;
    showMsg(`+${state.gems[gi].val} skill gem${state.gems[gi].val>1?'s':''}!`);
    state.gems.splice(gi,1);
  }

  // Pick up potion
  const pi = state.potions.findIndex(pt=>pt.x===nx&&pt.y===ny);
  if (pi!==-1) {
    const pt = state.potions[pi];
    p.potions[pt.type]++;
    showMsg(pt.type==='red'
      ? 'Found a Healing Potion! 🔴'
      : 'Found a Mana Potion! 🔵');
    state.potions.splice(pi,1);
  }

  // Stairs
  const onStairs = state.map[ny][nx]===T.STAIRS;
  document.getElementById('stairs-btn').style.display = onStairs?'block':'none';
  if (onStairs) showMsg('Stairs! Tap ⬇ to descend.');

  enemyTurns();
  updateUI();
  computeVision(state.fow,state.map,p.x,p.y,visionRadius());
  render();
}

function checkLevelUp() {
  const p = state.player;
  if (p.xp >= xpThreshold(p.level)) {
    p.level++; p.atk++;
    p.maxHp+=5; p.hp=Math.min(p.maxHp,p.hp+5);
    showMsg(`Level up! Lv${p.level} — ATK ${p.atk}, HP +5`);
  }
}

function enemyTurns() {
  const p = state.player;
  const mit = mitigation();
  const det = detectRange();
  for (const e of state.enemies) {
    if (state.fow[e.y][e.x]!==2) continue;
    const dx=p.x-e.x, dy=p.y-e.y;
    const dist=Math.abs(dx)+Math.abs(dy);
    if (dist===1) {
      const dmg = Math.max(1, Math.round(e.atk*(1-mit)));
      p.hp-=dmg;
      if (p.hp<=0) { p.hp=0; state.alive=false; showDeath(); return; }
    } else if (dist<=det) {
      const mx=Math.sign(dx),my=Math.sign(dy);
      const opts=[];
      if(mx!==0) opts.push([mx,0]);
      if(my!==0) opts.push([0,my]);
      if(mx!==0&&my!==0) opts.push([mx,my]);
      for (const [ox,oy] of opts) {
        const ex=e.x+ox,ey=e.y+oy;
        if(ex<0||ey<0||ex>=MAP_W||ey>=MAP_H) continue;
        if(state.map[ey][ex]===T.WALL) continue;
        if(state.enemies.some(o=>o!==e&&o.x===ex&&o.y===ey)) continue;
        if(ex===p.x&&ey===p.y) continue;
        e.x=ex; e.y=ey; break;
      }
    }
  }
}

function showDeath() {
  const ov = document.getElementById('start-overlay');
  const d   = state.diff;
  ov.innerHTML = `
    <h1 style="color:#e74c3c">YOU DIED</h1>
    <p style="color:#888;text-align:center;line-height:1.8">
      Floor&nbsp;${state.floor} &nbsp;·&nbsp; Gems&nbsp;${state.player.gems} &nbsp;·&nbsp; Lv&nbsp;${state.player.level}<br>
      <span style="color:${d.color}">${d.label}</span> difficulty
    </p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="big-btn" id="retry-btn" style="border-color:${d.color}">↺ Retry ${d.label}</button>
      <button class="big-btn" id="rediff-btn" style="border-color:#555;color:#aaa;font-size:.85rem">☰ Change difficulty</button>
    </div>`;
  ov.style.display = 'flex';
  document.getElementById('retry-btn').addEventListener('click', () => {
    ov.style.display='none'; newGame(d.key);
  }, {once:true});
  document.getElementById('rediff-btn').addEventListener('click', () => {
    buildStartScreen();
  }, {once:true});
}

// Potion use
function usePotion(type) {
  const p = state.player;
  if (p.potions[type]<=0) { showMsg(type==='red'?'No healing potions!':'No mana potions!'); return; }
  p.potions[type]--;
  if (type==='red') {
    const heal=10; p.hp=Math.min(p.maxHp,p.hp+heal);
    showMsg(`🔴 Healing Potion — +${heal} HP`);
  } else {
    const restore=10; const curMax=maxMp();
    p.mp=Math.min(curMax,p.mp+restore);
    showMsg(`🔵 Mana Potion — +${restore} MP`);
  }
  updateUI(); render();
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  if (!state.map) return;
  const p=state.player;
  const cw=canvas.width, ch=canvas.height;
  ctx.fillStyle='#06060e'; ctx.fillRect(0,0,cw,ch);

  const pwx=p.x*TILE+TILE/2, pwy=p.y*TILE+TILE/2;
  const camX=pwx-cw/(2*zoom), camY=pwy-ch/(2*zoom);
  const startTX=Math.max(0,Math.floor(camX/TILE));
  const startTY=Math.max(0,Math.floor(camY/TILE));
  const endTX=Math.min(MAP_W-1,Math.ceil((camX+cw/zoom)/TILE));
  const endTY=Math.min(MAP_H-1,Math.ceil((camY+ch/zoom)/TILE));

  ctx.save();
  ctx.scale(zoom,zoom);
  ctx.translate(-camX,-camY);

  // Tiles
  for (let ty=startTY;ty<=endTY;ty++) {
    for (let tx=startTX;tx<=endTX;tx++) {
      const vis=state.fow[ty][tx];
      if(vis===0) continue;
      const tile=state.map[ty][tx];
      const px=tx*TILE, py=ty*TILE;
      const lit=vis===2;
      if (tile===T.WALL)        ctx.drawImage(lit?sprites.wallLit:sprites.wall,px,py);
      else if (tile===T.STAIRS) ctx.drawImage(sprites.stairs,px,py);
      else                      ctx.drawImage(lit?sprites.floorLit:sprites.floor,px,py);
      if (!lit) { ctx.fillStyle='rgba(0,0,0,.62)'; ctx.fillRect(px,py,TILE,TILE); }
    }
  }

  // AoE flash
  if (flashTiles.length>0) {
    ctx.fillStyle='rgba(140,60,255,.38)';
    for (const t of flashTiles) {
      if(t.x>=startTX&&t.x<=endTX&&t.y>=startTY&&t.y<=endTY)
        ctx.fillRect(t.x*TILE,t.y*TILE,TILE,TILE);
    }
    // Border glow
    ctx.strokeStyle='rgba(200,120,255,.7)'; ctx.lineWidth=2;
    for (const t of flashTiles) {
      ctx.strokeRect(t.x*TILE+1,t.y*TILE+1,TILE-2,TILE-2);
    }
  }

  // World gems
  for (const g of state.gems) {
    if(state.fow[g.y][g.x]!==2) continue;
    ctx.drawImage(sprites.gem,g.x*TILE,g.y*TILE);
  }

  // World potions
  for (const pt of state.potions) {
    if(state.fow[pt.y][pt.x]!==2) continue;
    ctx.drawImage(pt.type==='red'?sprites.redPotion:sprites.bluePotion, pt.x*TILE, pt.y*TILE);
  }

  // Enemies
  for (const e of state.enemies) {
    if(state.fow[e.y][e.x]!==2) continue;
    ctx.drawImage(sprites[e.spriteKey],e.x*TILE,e.y*TILE);
    const bx=e.x*TILE+2, by=e.y*TILE+1;
    ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fillRect(bx-1,by-1,TILE-2,6);
    const ratio=e.hp/e.maxHp;
    ctx.fillStyle=ratio>.5?'#2ecc71':ratio>.25?'#f39c12':'#e74c3c';
    ctx.fillRect(bx,by,(TILE-4)*ratio,4);
  }

  // Player
  ctx.drawImage(sprites.player,p.x*TILE,p.y*TILE);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// SKILL SHOP
// ═══════════════════════════════════════════════════════════════
function openSkillShop() {
  const p = state.player;
  document.getElementById('shop-gems-count').textContent = '💎 '+p.gems;
  const list = document.getElementById('skill-list');
  list.innerHTML = '';

  for (const def of SKILL_DEFS) {
    const lv = state.skills[def.id];
    const maxed = lv >= def.maxLevel;
    const canAfford = p.gems >= def.cost;
    const item = document.createElement('div');
    item.className = 'skill-item'+(maxed?' maxed':'');
    item.innerHTML = `
      <div class="skill-icon">${def.icon}</div>
      <div class="skill-info">
        <div class="skill-name">${def.name}
          <span class="skill-lv">Lv ${lv}/${def.maxLevel}</span>
        </div>
        <div class="skill-desc">
          ${lv>0 ? '▸ '+def.effectLine(lv)+'<br>' : ''}
          ${maxed ? '<span style="color:#20e8b0">MAXED</span>'
                  : '→ '+def.nextLine(lv)}
        </div>
      </div>
      <button class="skill-buy" data-id="${def.id}"
        ${maxed||!canAfford?'disabled':''}>
        ${maxed ? '✓' : '💎'+def.cost}
      </button>`;
    list.appendChild(item);
  }

  // Buy buttons
  list.querySelectorAll('.skill-buy:not(:disabled)').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const def = SKILL_DEFS.find(d=>d.id===id);
      if (!def||p.gems<def.cost||state.skills[id]>=def.maxLevel) return;
      p.gems -= def.cost;
      state.skills[id]++;
      // Special: buying manaWell immediately raises maxMp; fill the difference
      if (id==='manaWell') {
        const newMax=maxMp();
        p.mp=Math.min(newMax,p.mp+(newMax-(maxMp()-10)));
      }
      updateUI();
      openSkillShop(); // refresh
      showMsg(`${def.name} upgraded to Lv${state.skills[id]}!`);
    });
  });

  document.getElementById('skill-shop').style.display='flex';
}

document.getElementById('gems-btn').addEventListener('click',()=>{
  if (state.map) openSkillShop();
});
document.getElementById('shop-close-btn').addEventListener('click',()=>{
  document.getElementById('skill-shop').style.display='none';
});

// ═══════════════════════════════════════════════════════════════
// POTION BUTTONS
// ═══════════════════════════════════════════════════════════════
document.getElementById('pot-red').addEventListener('click', ()=>usePotion('red'));
document.getElementById('pot-blue').addEventListener('click',()=>usePotion('blue'));

// ═══════════════════════════════════════════════════════════════
// PINCH ZOOM
// ═══════════════════════════════════════════════════════════════
let pinchActive=false, pinchStartDist=0, pinchStartZoom=1;
function getTouchDist(t){
  const dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

// ═══════════════════════════════════════════════════════════════
// CANVAS TOUCH / TAP / SWIPE
// ═══════════════════════════════════════════════════════════════
let touchStartX=0,touchStartY=0,touchStartTime=0;
const SWIPE_MIN=18;

function tapToDir(cx,cy){
  const dx=cx-canvas.width/2, dy=cy-canvas.height/2;
  const dead=TILE*zoom/3;
  if(Math.abs(dx)<dead&&Math.abs(dy)<dead) return [0,0];
  return Math.abs(dx)>Math.abs(dy)?[dx>0?1:-1,0]:[0,dy>0?1:-1];
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    pinchActive=true; pinchStartDist=getTouchDist(e.touches); pinchStartZoom=zoom;
  } else if(e.touches.length===1&&!pinchActive){
    touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; touchStartTime=Date.now();
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&pinchActive){
    zoom=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,pinchStartZoom*getTouchDist(e.touches)/pinchStartDist));
    render();
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(pinchActive){ if(e.touches.length<2) pinchActive=false; return; }
  if(!state.alive) return;
  const dt=Date.now()-touchStartTime;
  const ex=e.changedTouches[0].clientX, ey=e.changedTouches[0].clientY;
  const sdx=ex-touchStartX, sdy=ey-touchStartY;
  if(dt<400&&(Math.abs(sdx)>SWIPE_MIN||Math.abs(sdy)>SWIPE_MIN)){
    Math.abs(sdx)>Math.abs(sdy)?tryMove(sdx>0?1:-1,0):tryMove(0,sdy>0?1:-1);
  } else {
    tryMove(...tapToDir(ex,ey));
  }
},{passive:false});

let mouseDown=false;
canvas.addEventListener('mousedown',e=>{mouseDown=true;touchStartX=e.clientX;touchStartY=e.clientY;touchStartTime=Date.now();});
canvas.addEventListener('mouseup',e=>{
  if(!mouseDown) return; mouseDown=false;
  if(!state.alive) return;
  const dt=Date.now()-touchStartTime;
  const sdx=e.clientX-touchStartX,sdy=e.clientY-touchStartY;
  if(dt<400&&(Math.abs(sdx)>SWIPE_MIN||Math.abs(sdy)>SWIPE_MIN)){
    Math.abs(sdx)>Math.abs(sdy)?tryMove(sdx>0?1:-1,0):tryMove(0,sdy>0?1:-1);
  } else {
    tryMove(...tapToDir(e.clientX,e.clientY));
  }
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  zoom=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,zoom*(e.deltaY<0?1.1:.9)));
  render();
},{passive:false});

// ═══════════════════════════════════════════════════════════════
// D-PAD
// ═══════════════════════════════════════════════════════════════
// Center button fires magic, not movement
const DPAD_DIRS = {'dpad-n':[0,-1],'dpad-s':[0,1],'dpad-w':[-1,0],'dpad-e':[1,0]};
let dpadInterval=null, dpadActiveBtn=null;

function dpadBegin(id){
  if(dpadActiveBtn===id) return;
  dpadEnd();
  dpadActiveBtn=id;
  document.getElementById(id)?.classList.add('active');
  if(id==='dpad-c'){
    magicAttack();
    // No repeat for magic; one cast per tap
    return;
  }
  const dir=DPAD_DIRS[id];
  tryMove(...dir);
  dpadInterval=setInterval(()=>tryMove(...dir),160);
}
function dpadEnd(){
  if(dpadActiveBtn){ document.getElementById(dpadActiveBtn)?.classList.remove('active'); dpadActiveBtn=null; }
  clearInterval(dpadInterval); dpadInterval=null;
}

['dpad-n','dpad-s','dpad-w','dpad-e','dpad-c'].forEach(id=>{
  const btn=document.getElementById(id); if(!btn) return;
  btn.addEventListener('touchstart',e=>{e.preventDefault();dpadBegin(id);},{passive:false});
  btn.addEventListener('touchend',  e=>{e.preventDefault();dpadEnd();},  {passive:false});
  btn.addEventListener('touchcancel',e=>{e.preventDefault();dpadEnd();}, {passive:false});
  btn.addEventListener('mousedown',()=>dpadBegin(id));
  btn.addEventListener('mouseup',  ()=>dpadEnd());
  btn.addEventListener('mouseleave',()=>dpadEnd());
});

// ═══════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(!state.alive) return;
  const dirs={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
    w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],k:[0,-1],j:[0,1],h:[-1,0],l:[1,0]};
  if(e.key==='+'||e.key==='='){ zoom=Math.min(ZOOM_MAX,zoom*1.15);render();return; }
  if(e.key==='-'){ zoom=Math.max(ZOOM_MIN,zoom/1.15);render();return; }
  if(e.key===' '||e.key==='z'){ e.preventDefault();magicAttack();return; }
  const dir=dirs[e.key];
  if(dir){ e.preventDefault(); tryMove(...dir); }
});

// ═══════════════════════════════════════════════════════════════
document.getElementById('stairs-btn').addEventListener('click',nextFloor);

// ═══════════════════════════════════════════════════════════════
// START SCREEN  (also used after death → "change difficulty")
// ═══════════════════════════════════════════════════════════════
function buildStartScreen() {
  const ov = document.getElementById('start-overlay');
  ov.innerHTML = `
    <h1>TAP DUNGEON</h1>
    <p style="color:#888;font-size:.82rem;text-align:center;line-height:1.7;max-width:300px">
      Tap / D-pad to move &amp; attack.<br>
      <b style="color:#cc88ff">✦</b> = Magic Blast (costs MP) &nbsp;·&nbsp;
      Pinch to zoom.<br>
      Collect 💎 gems · use 🔴🔵 potions · find ⬇ stairs.
    </p>
    <p style="color:#aaa;font-size:.85rem;margin-bottom:4px">Choose difficulty:</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      ${Object.values(DIFFICULTIES).map(d=>`
        <button class="big-btn diff-pick" data-diff="${d.key}"
          style="border-color:${d.color};font-size:.9rem;padding:12px 20px;flex-direction:column;display:flex;align-items:center;gap:4px">
          <span style="color:${d.color};font-size:1.05rem">${d.label}</span>
          <span style="font-size:.72rem;color:#888;font-weight:normal">${d.desc}</span>
        </button>`).join('')}
    </div>`;
  ov.style.display = 'flex';
  ov.querySelectorAll('.diff-pick').forEach(btn => {
    btn.addEventListener('click', () => {
      ov.style.display = 'none';
      buildSprites();
      newGame(btn.dataset.diff);
    }, {once:true});
  });
}

// ── Boot ──────────────────────────────────────────────────────
buildStartScreen();
